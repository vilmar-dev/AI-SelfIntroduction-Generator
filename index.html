<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <style>
         
*{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

       body{
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    overflow: hidden;

    background: linear-gradient(-45deg, #ff6b6b, #6c5ce7, #00cec9, #0984e3);
    background-size: 400% 400%;

    animation: changeBackground 10s ease infinite;
}

/* BACKGROUND ANIMATION */

@keyframes changeBackground {

    0%{
        background-position: 0% 50%;
    }

    50%{
        background-position: 100% 50%;
    }

    100%{
        background-position: 0% 50%;
    }
}

        .container{
            background-color: white;
            width: 100%;
            max-width: 600px;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        h1{
            color: #1e3c72;
            margin-bottom: 15px;
            font-size: 2rem;
        }

        h2{
                    
            color: #555;
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 25px;

        }

        .btn{
            display: inline-block;
            padding: 12px 25px;
            background-color: #1e3c72;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            transition: 0.3s;
            font-weight: bold;
        }

        .btn:hover{
            background-color: #16325c;
            transform: scale(1.05);
        }




        

        @media (max-width: 600px){

            .container{
                padding: 25px;
            }

            h1{
                font-size: 1.5rem;
            }

            h2{
                font-size: 0.95rem;
            }
        }






        /* added */
        @media (max-width: 600px){

    .container{
        padding: 25px;
    }

    h1{
        font-size: 1.5rem;
    }

    h2{
        font-size: 1.1rem;
        line-height: 1.7;
    }
}

    
    </style>
</head>
<body>

</body>
</html>
